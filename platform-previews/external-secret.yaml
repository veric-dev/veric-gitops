# GitHub PAT for the PR previews ApplicationSet's pullRequest generator.
# Sourced from foundation Secrets Manager via the cluster's ESO
# ClusterSecretStore (wired by platform-services/external-secrets).
#
# Operator action: create the secret in foundation SM under the path
# `/veric/foundation/github/pr-previews-token` with payload `{"token": "..."}`.
# Token scope: `repo` (read PRs + commit statuses on veric-saas).

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-pr-previews-token
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-foundation-secretsmanager
  target:
    name: github-pr-previews-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: /veric/foundation/github/pr-previews-token
        property: token
