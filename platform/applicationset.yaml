# Cluster-services ApplicationSet
#
# One Application per (service) targeting the in-cluster destination. The
# cluster-info ConfigMap (in argocd ns, written by Tofu argocd-apps module)
# supplies environment + platform labels read by Helm values via plain
# ConfigMap mount or by Argo's templating.
#
# We use a list generator (one entry per platform-service) plus a deferred
# values-file selection based on the cluster's "environment_short" label.
# Argo's git generator can't read the local cluster's CM — we work around
# that by storing per-platform values in the same paths and selecting via
# the env label baked into the Application name at bootstrap time.
#
# This file is the SECOND link in the bootstrap chain (after Tofu's
# bootstrap Application points at this directory).

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-services
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # matrix(services × clusters) — same shape as tenant-apps. Each cluster's
    # local argocd only sees its own in-cluster Secret, so on any given
    # cluster the matrix produces exactly one Application per service. This
    # lets per-env values files (values-<env_short>.yaml) override account-
    # specific things like IRSA role ARNs.
    - matrix:
        generators:
          - list:
              elements:
                - service: external-secrets
                  syncWave: "-3"
                - service: external-dns
                  syncWave: "-2"
                - service: cluster-autoscaler
                  syncWave: "-2"
                - service: karpenter
                  syncWave: "-2"
                - service: argocd-image-updater
                  syncWave: "-1"
                - service: argo-rollouts
                  syncWave: "-1"
                # ARC (arc-controller, arc-runner-set) and BuildKit are scoped
                # to platform-dev only via a separate bootstrap path
                # (platform-arc/). For ARC: redundant listeners against the same
                # scale-set name collide on org level. For BuildKit: there are
                # no runners on np/prod that would consume it, so it'd just
                # idle 8GiB of RAM per cluster.
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: '{{.service}}-{{index .metadata.labels "platform.veric.dev/environment-short"}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{.syncWave}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/veric-dev/veric-gitops
        targetRevision: main
        path: 'platform-services/{{.service}}'
        helm:
          # ignoreMissingValueFiles: services without per-env overrides keep
          # using values.yaml only (no error if values-<env>.yaml is absent).
          ignoreMissingValueFiles: true
          valueFiles:
            - values.yaml
            - values-{{index .metadata.labels "platform.veric.dev/environment-short"}}.yaml
      destination:
        server: '{{.server}}'
        namespace: '{{.service}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      # ESO injects defaults (decodingStrategy, metadataPolicy, deletionPolicy,
      # creationPolicy, conversionStrategy) on ExternalSecrets that aren't in
      # the chart-rendered manifest. Ignore those so apps stay InSync.
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jsonPointers:
            - /spec/data
            - /spec/target/creationPolicy
            - /spec/target/deletionPolicy
