# Tenant apps (vs platform-services). Matrix(list × clusters) fans out one
# Application per (app, cluster) pair. Each platform's argocd only sees its
# own in-cluster (registered as a labeled Secret by tofu argocd_apps), so on
# any given cluster the matrix produces exactly one Application per app.
#
# The cluster's `platform.veric.dev/environment-short` label (pdev|nonprod|prod)
# selects the per-env values file (apps/<app>/values-<env_short>.yaml).
#
# Apps default to enabled: false in their values-*.yaml — flipped on per-env
# during Azure→AWS cutover.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - list:
              elements:
                # `imageList` drives the argocd-image-updater annotation
                # rendered below — set to "" to opt out (apps with no
                # ECR image, or images not yet wired through CI).
                - app: platform-smoke
                  namespace: platform-smoke
                  syncWave: "0"
                  imageList: ""
                # web-bootstrap runs in the `bootstrap` namespace (created by
                # the cluster-config tofu module) and seeds DATABASE_URL +
                # BETTER_AUTH_SECRET into foundation SM. Must complete before
                # web's ESO refreshes (web syncWave 10 ≫ this 9).
                - app: web-bootstrap
                  namespace: bootstrap
                  syncWave: "9"
                  imageList: ""
                - app: web
                  namespace: web
                  syncWave: "10"
                  imageList: "web=487542879472.dkr.ecr.us-west-2.amazonaws.com/veric-saas"
                - app: telemetry-worker
                  namespace: telemetry-worker
                  syncWave: "11"
                  imageList: "worker=487542879472.dkr.ecr.us-west-2.amazonaws.com/veric-saas-worker"
                - app: dbt
                  namespace: dbt
                  syncWave: "12"
                  imageList: "dbt=487542879472.dkr.ecr.us-west-2.amazonaws.com/veric-dbt"
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: '{{.app}}-{{index .metadata.labels "platform.veric.dev/environment-short"}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{.syncWave}}'
        # argocd-image-updater wiring. The `image-list` value uses
        # the alias=registry/repo form; per-image strategy + tag
        # filter pin to `sha-XXXXXXXXXXXX` from deploy-eks-{web,worker}.yml.
        # Write-back is `argocd` (Application annotation), not `git`,
        # because pdev/nonprod auto-track main while prod pins to a
        # PR-only path (see platform-services/argocd-image-updater).
        # `imageList: ""` (platform-smoke, dbt) renders an empty
        # annotation that image-updater ignores.
        argocd-image-updater.argoproj.io/image-list: '{{.imageList}}'
        argocd-image-updater.argoproj.io/web.update-strategy: latest
        argocd-image-updater.argoproj.io/web.allow-tags: 'regexp:^sha-[0-9a-f]{12}$'
        argocd-image-updater.argoproj.io/web.helm.image-name: image.repository
        argocd-image-updater.argoproj.io/web.helm.image-tag: image.tag
        argocd-image-updater.argoproj.io/worker.update-strategy: latest
        argocd-image-updater.argoproj.io/worker.allow-tags: 'regexp:^sha-[0-9a-f]{12}$'
        argocd-image-updater.argoproj.io/worker.helm.image-name: image.repository
        argocd-image-updater.argoproj.io/worker.helm.image-tag: image.tag
        argocd-image-updater.argoproj.io/dbt.update-strategy: latest
        argocd-image-updater.argoproj.io/dbt.allow-tags: 'regexp:^sha-[0-9a-f]{12}$'
        argocd-image-updater.argoproj.io/dbt.helm.image-name: image.repository
        argocd-image-updater.argoproj.io/dbt.helm.image-tag: image.tag
        argocd-image-updater.argoproj.io/write-back-method: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/veric-dev/veric-gitops
        targetRevision: main
        path: 'apps/{{.app}}'
        helm:
          # ignoreMissingValueFiles: lets platform-smoke (no per-env files)
          # coexist with apps that have full values-{pdev,nonprod,prod}.yaml.
          ignoreMissingValueFiles: true
          valueFiles:
            - values.yaml
            - values-{{index .metadata.labels "platform.veric.dev/environment-short"}}.yaml
      destination:
        server: '{{.server}}'
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jsonPointers:
            - /spec/data
            - /spec/target/creationPolicy
            - /spec/target/deletionPolicy
