enabled: false
# Run far less frequently in pdev — once a day at 04:15 UTC.
schedule: "15 4 * * *"
env:
  DBT_TARGET: pdev
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
serviceAccount:
  name: dbt
  roleArn: arn:aws:iam::381234267633:role/veric-app-dbt-veric-platform-dev
