enabled: false
schedule: "15 */6 * * *"   # every 6 hours
env:
  DBT_PROFILES_DIR: /app/.dbt
  DBT_TARGET: nonprod
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi
serviceAccount:
  name: dbt
  roleArn: arn:aws:iam::155055143405:role/veric-app-dbt-veric-platform-nonprod
