# platform-prod — hosted ai-kernel-server at kernel.veric.dev.
#
# Promotion model: gitops-pinned (Option β — image-updater is disabled
# for env=prod in platform/apps-applicationset.yaml). To promote a new
# build:
#   1. Confirm the sha is healthy in ECR scans + ai-fundamentals CI.
#   2. Bump `tag` below.
#   3. Rollback = `git revert` the bump commit.

enabled: true

image:
  tag: sha-000000000000   # placeholder; first kernel-image-build.yml run replaces this

ingress:
  hostname: kernel.veric.dev
  certificateArn: arn:aws:acm:us-west-2:514224758553:certificate/1229a8a8-00e9-4fc3-ab11-110f57485366
  # Join the shared platform-prod ALB group so kernel.veric.dev rides on
  # the same ALB as app.prod.veric.dev / veric.dev. SNI handles the
  # *.veric.dev cert vs the apex cert. ~$22/mo saved over a separate ALB.
  groupName: platform-prod
  groupOrder: 40

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 65

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1500m
    memory: 768Mi
