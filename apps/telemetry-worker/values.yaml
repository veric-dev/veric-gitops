# Defaults for the telemetry-worker chart. See apps/web/values.yaml for
# the broader scaffold rationale (default-disabled, per-env overrides).

enabled: false

image:
  repository: 487542879472.dkr.ecr.us-west-2.amazonaws.com/veric-saas-worker
  tag: "0.0.0"
  pullPolicy: IfNotPresent

replicaCount: 1

# Standalone Node HTTP service. Exposes POST /api/v1/telemetry and a
# plaintext GET /healthz for k8s probes. The ALB ingress is per-env
# because the cert ARN + hostname are platform-specific.
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: alb
  hostname: ""           # set per-env (e.g. telemetry.nonprod.veric.dev)
  certificateArn: ""     # set per-env from tofu output platform_certificate_arn
  scheme: internet-facing

env:
  NODE_ENV: production
  PORT: "8080"

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStore: aws-foundation-secretsmanager
  data: []
  # Suggested entries during cutover:
  #   - secretKey: DATABASE_URL
  #     remoteKey: /veric/<env>/telemetry-worker/database-url
  #   - secretKey: SNOWFLAKE_INGEST_PASSWORD
  #     remoteKey: /veric/<env>/telemetry-worker/snowflake-password

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 3
    periodSeconds: 5

pdb:
  enabled: false
  minAvailable: 1

rds:
  ssmEndpointParam: ""
  ssmPortParam: ""
  ssmDbNameParam: ""
  masterSecretName: ""

serviceAccount:
  name: telemetry-worker
  roleArn: ""
