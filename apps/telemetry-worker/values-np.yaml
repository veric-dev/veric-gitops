enabled: true
image:
  # Pinned manually pending image-updater fix (#76). The :main floating
  # tag in ECR still points at the pre-port Azure Functions image, which
  # has no /healthz on :8080 and fails the new readiness probe.
  tag: sha-b2a63bb013f3
replicaCount: 2

ingress:
  hostname: telemetry.nonprod.veric.dev
  certificateArn: arn:aws:acm:us-west-2:155055143405:certificate/8ce82722-2da5-4f24-8f4b-f64077abc6fa
  # 2026-05-09 cost batch (O10 promotion): join the shared platform-np
  # ALB group. See apps/web/values-np.yaml for context.
  groupName: platform-np
  groupOrder: 40
pdb:
  enabled: true
  minAvailable: 1
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
rds:
  ssmEndpointParam: /veric/platform-nonprod/rds/endpoint
  ssmPortParam: /veric/platform-nonprod/rds/port
  ssmDbNameParam: /veric/platform-nonprod/rds/db-name
  masterSecretName: /veric/platform-nonprod/rds/master
serviceAccount:
  name: telemetry-worker
  roleArn: arn:aws:iam::155055143405:role/veric-app-telemetry-worker-veric-platform-nonprod

externalSecrets:
  enabled: true
  data:
    - secretKey: SNOWFLAKE_INGEST_ACCOUNT
      remoteKey: /veric/platform-nonprod/telemetry-worker/snowflake-account
    - secretKey: SNOWFLAKE_INGEST_USER
      remoteKey: /veric/platform-nonprod/telemetry-worker/snowflake-user
    - secretKey: SNOWFLAKE_INGEST_PASSWORD
      remoteKey: /veric/platform-nonprod/telemetry-worker/snowflake-password
