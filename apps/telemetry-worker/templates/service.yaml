{{- if .Values.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: telemetry-worker
  labels:
    {{- include "telemetry-worker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "telemetry-worker.selectorLabels" . | nindent 4 }}
{{- end }}
