enabled: true

image:
  # Prod is gitops-pinned (Option β — image-updater is disabled on env=prod
  # in platform/apps-applicationset.yaml). To promote a new build:
  # 1. Confirm the sha is healthy on np + pdev (auto-tracked).
  # 2. Bump this `tag` (use .github/workflows/promote-prod.yml or hand-edit + PR).
  # 3. Rollback = `git revert` the bump commit.
  tag: sha-4775dc4157c7

replicaCount: 3

ingress:
  hostname: telemetry.prod.veric.dev
  certificateArn: arn:aws:acm:us-west-2:514224758553:certificate/1229a8a8-00e9-4fc3-ab11-110f57485366

pdb:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

rds:
  ssmEndpointParam: /veric/platform-prod/rds/endpoint
  ssmPortParam: /veric/platform-prod/rds/port
  ssmDbNameParam: /veric/platform-prod/rds/db-name
  masterSecretName: /veric/platform-prod/rds/master

serviceAccount:
  name: telemetry-worker
  roleArn: arn:aws:iam::514224758553:role/veric-app-telemetry-worker-veric-platform-prod

externalSecrets:
  enabled: true
  data:
    - secretKey: SNOWFLAKE_INGEST_ACCOUNT
      remoteKey: /veric/platform-prod/telemetry-worker/snowflake-account
    - secretKey: SNOWFLAKE_INGEST_USER
      remoteKey: /veric/platform-prod/telemetry-worker/snowflake-user
    - secretKey: SNOWFLAKE_INGEST_PASSWORD
      remoteKey: /veric/platform-prod/telemetry-worker/snowflake-password
