enabled: true

image:
  # Initial tag = `main` (floating). argocd-image-updater pins this to a
  # specific sha-XXX on its next poll cycle and writes the override into
  # the Application's helm parameters (allow-tags regexp filters anything
  # but `sha-[0-9a-f]{12}`).
  tag: main

ingress:
  hostname: app.pdev.veric.dev
  certificateArn: arn:aws:acm:us-west-2:381234267633:certificate/6699dbb0-896c-4552-8ed0-c57432f58b38
  # 2026-05-05 cost batch (O10): join the shared pdev ALB group. argocd
  # carries the same group.name (in tofu via the argocd module override
  # in environments/platform-dev). When all 4 dev ingresses share the
  # group, AWS LB Controller collapses them to one ALB. ~$53/mo saved.
  groupName: platform-pdev
  groupOrder: 30

autoscaling:
  enabled: false

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ESO disabled on pdev: SM seeds for /veric/platform-dev/web/{database-url,
# better-auth-secret} aren't populated yet, and the web app handles
# missing DATABASE_URL / BETTER_AUTH_SECRET gracefully (returns errors
# at request time but boots and serves /api/health). Flip on once the
# secrets land.
externalSecrets:
  enabled: false

rds:
  ssmEndpointParam: /veric/platform-dev/rds/endpoint
  ssmPortParam: /veric/platform-dev/rds/port
  ssmDbNameParam: /veric/platform-dev/rds/db-name
  masterSecretName: /veric/platform-dev/rds/master

serviceAccount:
  name: web
  roleArn: arn:aws:iam::381234267633:role/veric-app-web-veric-platform-dev
