# platform-nonprod — first env to flip on during Azure cutover.
enabled: true

# Initial tag = `main` (floating, pushed on every veric-saas main build).
# argocd-image-updater pins this to a specific sha-XXX on its next poll
# cycle (allow-tags regexp filters anything but `sha-[0-9a-f]{12}`).
image:
  tag: main

ingress:
  hostname: app.nonprod.veric.dev
  certificateArn: arn:aws:acm:us-west-2:155055143405:certificate/8ce82722-2da5-4f24-8f4b-f64077abc6fa

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

replicaCount: 2

pdb:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

rds:
  ssmEndpointParam: /veric/platform-nonprod/rds/endpoint
  ssmPortParam: /veric/platform-nonprod/rds/port
  ssmDbNameParam: /veric/platform-nonprod/rds/db-name
  masterSecretName: /veric/platform-nonprod/rds/master

serviceAccount:
  name: web
  roleArn: arn:aws:iam::155055143405:role/veric-app-web-veric-platform-nonprod

externalSecrets:
  data:
    - secretKey: DATABASE_URL
      remoteKey: /veric/platform-nonprod/web/database-url
    - secretKey: BETTER_AUTH_SECRET
      remoteKey: /veric/platform-nonprod/web/better-auth-secret
