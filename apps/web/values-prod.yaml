# platform-prod — last to flip; requires SES out of sandbox + post-cutover sign-off.
enabled: true

image:
  # Initial tag = `main` (floating). argocd-image-updater pins this to a
  # specific sha-XXX on its next poll cycle and writes the override into
  # the Application's helm parameters (allow-tags regexp filters anything
  # but `sha-[0-9a-f]{12}`).
  tag: main

ingress:
  hostname: app.prod.veric.dev
  certificateArn: arn:aws:acm:us-west-2:514224758553:certificate/1229a8a8-00e9-4fc3-ab11-110f57485366
  # Apex cutover (P12-A4 unblocker, 2026-05-01): the prod web ingress also
  # serves veric.dev + www.veric.dev so the CF apex CNAME can flip from
  # Azure CAE → AWS ALB. Apex cert is per-env tofu output apex_certificate_arn.
  additionalHosts:
    - veric.dev
    - www.veric.dev
  additionalCertArns:
    - arn:aws:acm:us-west-2:514224758553:certificate/e089bfd3-8173-4e26-b241-6d223c3e5acd

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65

replicaCount: 3

pdb:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

rds:
  ssmEndpointParam: /veric/platform-prod/rds/endpoint
  ssmPortParam: /veric/platform-prod/rds/port
  ssmDbNameParam: /veric/platform-prod/rds/db-name
  masterSecretName: /veric/platform-prod/rds/master

serviceAccount:
  name: web
  roleArn: arn:aws:iam::514224758553:role/veric-app-web-veric-platform-prod

env:
  NODE_ENV: production
  NEXT_RUNTIME: nodejs
  DATABASE_SSL: require
  DRIZZLE_MIGRATIONS_FOLDER: /app/packages/infrastructure/drizzle

externalSecrets:
  data:
    - secretKey: DATABASE_URL
      remoteKey: /veric/platform-prod/web/database-url
    - secretKey: BETTER_AUTH_SECRET
      remoteKey: /veric/platform-prod/web/better-auth-secret

# Step-based canary: 25% (pause 60s) → 50% (pause 60s) → 75% (pause 60s)
# → 100%. Pod readiness gates each step — a broken image fails at 25%
# rather than rolling all 3 replicas at once. Add AnalysisTemplate gating
# (latency / error-rate) once §4.4 observability lands.
rollout:
  enabled: true
