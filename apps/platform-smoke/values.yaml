image:
  # Public image for the first smoke — once we're confident, we'll swap to
  # an ECR-hosted image to also exercise cross-account ECR pulls.
  repository: nginxinc/nginx-unprivileged
  tag: "1.27"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: alb
  hostname: smoke.pdev.veric.dev
  certificateArn: "arn:aws:acm:us-west-2:381234267633:certificate/6699dbb0-896c-4552-8ed0-c57432f58b38"
  # 2026-05-05 cost batch (O10): join the shared pdev ALB group. Default
  # set in values.yaml because pdev-only chart (np/prod disable ingress).
  groupName: platform-pdev
  groupOrder: 50

resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi
