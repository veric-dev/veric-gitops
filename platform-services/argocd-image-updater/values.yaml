argocd-image-updater:
  config:
    # `kubernetes` API kind reads Argo Application CRDs directly via the
    # in-cluster API and writes annotation updates back to the same. No
    # gRPC-to-argocd-server hop, no token-plumbing, no TLS-inception
    # against argocd-server's `--insecure` HTTP. Auth is the pod's SA
    # (chart wires the right RBAC). Recommended in-cluster setup since
    # image-updater v0.13.
    applicationsAPIKind: kubernetes
    # No :latest follows; Image Updater pinned to immutable :sha-XXX strategy.
    # Promotion model: nonprod auto-merge, prod requires PR (per design §2 #9).
    registries:
      - name: ECR
        api_url: https://487542879472.dkr.ecr.us-west-2.amazonaws.com
        prefix: 487542879472.dkr.ecr.us-west-2.amazonaws.com
        ping: yes
        insecure: no
        credentials: ext:/scripts/ecr-login.sh
        credsexpire: 11h
  # IRSA-backed ECR login. Chart mounts these at /scripts; the registries
  # entry above references `credentials: ext:/scripts/ecr-login.sh`.
  authScripts:
    enabled: true
    scripts:
      ecr-login.sh: |
        #!/bin/sh
        # awscli v2 wants to write ~/.aws on first run; container fs is RO,
        # so point HOME at /tmp before invoking. Output is base64
        # `AWS:<token>` which image-updater consumes as `user:pass`.
        export HOME=/tmp
        aws --region us-west-2 ecr get-authorization-token \
          --output text --query 'authorizationData[].authorizationToken' \
          | base64 -d
  # Tell image-updater to look for Applications in the `argocd` namespace
  # (Argo's namespace), not its own. Without this it scans only its own
  # namespace and finds zero apps. Pair with the cross-ns Role below.
  extraArgs:
    - --argocd-namespace=argocd
  rbac:
    enabled: true
  # IRSA role-arn is per-cluster (one role per platform account that
  # trusts that cluster's OIDC provider for the
  # argocd-image-updater/argocd-image-updater SA). Set it in
  # values-{pdev,np,prod}.yaml — leaving it blank here surfaces a clear
  # error on misconfigured clusters instead of silently falling back to
  # the wrong account's role.
  serviceAccount:
    create: true
    name: argocd-image-updater
  # The chart's built-in Role lives in the release namespace
  # (argocd-image-updater); Applications live in `argocd`. Add a second
  # Role+RoleBinding scoped to `argocd` so the SA can list/patch the
  # Application CRs it actually needs to update.
  extraObjects:
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: argocd-image-updater-apps
        namespace: argocd
      rules:
        - apiGroups: ["argoproj.io"]
          resources: ["applications"]
          verbs: ["get", "list", "watch", "update", "patch"]
        - apiGroups: [""]
          resources: ["secrets", "configmaps"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["create"]
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: argocd-image-updater-apps
        namespace: argocd
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: argocd-image-updater-apps
      subjects:
        - kind: ServiceAccount
          name: argocd-image-updater
          namespace: argocd-image-updater
