argocd-image-updater:
  config:
    # `kubernetes` API kind reads Argo Application CRDs directly via the
    # in-cluster API and writes annotation updates back to the same. No
    # gRPC-to-argocd-server hop, no token-plumbing, no TLS-inception
    # against argocd-server's `--insecure` HTTP. Auth is the pod's SA
    # (chart wires the right RBAC). Recommended in-cluster setup since
    # image-updater v0.13.
    applicationsAPIKind: kubernetes
    # No :latest follows; Image Updater pinned to immutable :sha-XXX strategy.
    # Promotion model: nonprod auto-merge, prod requires PR (per design §2 #9).
    registries:
      - name: ECR
        api_url: https://487542879472.dkr.ecr.us-west-2.amazonaws.com
        prefix: 487542879472.dkr.ecr.us-west-2.amazonaws.com
        ping: yes
        insecure: no
        credentials: ext:/scripts/ecr-login.sh
        credsexpire: 11h
  rbac:
    enabled: true
  # IRSA role-arn is per-cluster (one role per platform account that
  # trusts that cluster's OIDC provider for the
  # argocd-image-updater/argocd-image-updater SA). Set it in
  # values-{pdev,np,prod}.yaml — leaving it blank here surfaces a clear
  # error on misconfigured clusters instead of silently falling back to
  # the wrong account's role.
  serviceAccount:
    create: true
    name: argocd-image-updater
