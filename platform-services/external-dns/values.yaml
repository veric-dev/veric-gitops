external-dns:
  provider:
    name: cloudflare
  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: cloudflare-api-token
          key: token
  # Cloudflare token comes from external-secrets ExternalSecret pulling from
  # AWS SSM /veric/foundation/cloudflare/api-token. The ExternalSecret YAML
  # is in templates/external-secret.yaml of this chart.
  domainFilters:
    # Each cluster's external-dns is scoped to its own subdomain prefix; the
    # apex stays human-managed. Per-platform overrides live in values-{env}.yaml.
    - veric.dev
  policy: sync # we want it to delete records when k8s resources go away
  registry: txt
  # txtOwnerId is REQUIRED to be unique per cluster — collision causes the
  # external-dns instances to delete each other's records in a tight loop.
  # Set in values-{env}.yaml (values-pdev.yaml / values-np.yaml / values-prod.yaml).
  # Default left unset so a missing override fails loudly rather than silently
  # colliding.
  txtOwnerId: ""
  txtPrefix: _externaldns.
  sources:
    - service
    - ingress
  interval: 1m
