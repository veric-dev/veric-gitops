apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-foundation-ssm
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-west-2
      # The ESO ServiceAccount in this cluster has IRSA into a platform-account
      # role; that role has sts:AssumeRole on this foundation role, which holds
      # ssm:GetParameter on /veric/foundation/*.
      role: arn:aws:iam::487542879472:role/eso-foundation-reader
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
