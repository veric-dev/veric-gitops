# Defaults shared by all five ARC runner-set Helm releases. The
# applicationset.yaml in platform-arc/ instantiates this chart five
# times — one per legacy pool label (`fast`, `release`, `build`,
# `spot`, `self-hosted-linux-x64`) — overriding `runnerScaleSetName`
# and `maxRunners` via the helm `values:` block at install time.
# Each release gets its own namespace (`arc-runner-set-<pool>`) so
# the listener + ephemeral runner pods are isolated per pool.
#
# Per-pool resource overrides: applicationset.yaml's `release` entry
# inline-replaces the whole `gha-runner-scale-set.template` block to
# bump runner pods to D8as_v5-equiv (4c/8c/16Gi/32Gi) because
# veric-cli release-ship + duckdb-bundled needs that headroom (peak
# link RSS ~8 GiB, 24+ codegen units). Helm merges scalars/maps but
# REPLACES arrays — so overriding the runner container's `resources`
# without overriding the rest of the array means rewriting the whole
# `containers:` list per pool. The `release` pool does that; other
# pools inherit this file unchanged.
gha-runner-scale-set:
  # `runnerScaleSetName` and `maxRunners` are overridden per-pool by
  # platform-arc/applicationset.yaml; the values here are placeholders
  # that should never reach the cluster but are kept non-empty so
  # `helm template` works for local validation.
  runnerScaleSetName: PLACEHOLDER
  maxRunners: 1

  # Skip the runtime discovery dance — we know the controller's SA from
  # arc-controller/values.yaml.
  controllerServiceAccount:
    name: arc-controller
    namespace: arc-controller

  # Org-level scope so any veric-dev repo can dispatch jobs here.
  githubConfigUrl: "https://github.com/veric-dev"

  # Pre-created secret (synced from foundation SM by the
  # ExternalSecret in templates/external-secret.yaml).
  githubConfigSecret: arc-github-config

  # Scale-to-zero. Pods spawn on-demand, terminate after one job.
  minRunners: 0

  # Containers run as the default GitHub runner image. Override per-job
  # via container actions if needed.
  containerMode:
    type: ""   # empty = "kubernetes" mode disabled, plain pod mode

  template:
    metadata:
      # Karpenter v1 consolidation will evict an active runner pod as
      # "Underutilized" mid-job, killing CI runs at random points.
      # Observed 2026-05-02 across rust-ci on veric-engine / veric-ag /
      # veric-cli (cancellations during apt-install / cargo build).
      # `do-not-disrupt` opts the pod out of voluntary consolidation;
      # it stays in place for the lifetime of its single ephemeral job.
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: arc-runner
      containers:
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          command: ["/home/runner/run.sh"]
          # The actions-runner image bundles node20 at
          # /home/runner/externals/node20/bin but doesn't put it on
          # system PATH. Marketplace actions ship JS entrypoints with
          # `#!/usr/bin/env node` shebangs, so without this `tofu init`
          # (and any other action-wrapped step) fails with
          # "/usr/bin/env: 'node': No such file or directory".
          env:
            - name: PATH
              value: "/home/runner/externals/node20/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          resources:
            # 4 GiB was too tight for release builds of veric-cli (duckdb-bundled
            # peaks at ~8 GiB during link). Symptom: runner pod silently OOM-killed
            # mid-`cargo build` and GitHub Actions reports
            # "self-hosted runner lost communication with the server" because
            # the runner agent dies with the container. 16 GiB headroom matches
            # the prior Azure VMSS sizing (D4as_v5 = 16 GiB) so historically
            # green workflows stay green. The `release` pool bumps further to
            # D8as_v5 (32 GiB / 8 vCPU) — see applicationset.yaml.
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
