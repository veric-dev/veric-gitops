# Defaults shared by all five ARC runner-set Helm releases. The
# applicationset.yaml in platform-arc/ instantiates this chart five
# times — one per legacy pool label (`fast`, `release`, `build`,
# `spot`, `self-hosted-linux-x64`) — overriding `runnerScaleSetName`
# and `maxRunners` via the helm `values:` block at install time.
# Each release gets its own namespace (`arc-runner-set-<pool>`) so
# the listener + ephemeral runner pods are isolated per pool.
#
# Per-pool resource overrides: applicationset.yaml's `release` entry
# inline-replaces the whole `gha-runner-scale-set.template` block to
# bump runner pods to D8as_v5-equiv (4c/8c/16Gi/32Gi) because
# veric-cli release-ship + duckdb-bundled needs that headroom (peak
# link RSS ~8 GiB, 24+ codegen units). Helm merges scalars/maps but
# REPLACES arrays — so overriding the runner container's `resources`
# without overriding the rest of the array means rewriting the whole
# `containers:` list per pool. The `release` pool does that; other
# pools inherit this file unchanged.
gha-runner-scale-set:
  # `runnerScaleSetName` and `maxRunners` are overridden per-pool by
  # platform-arc/applicationset.yaml; the values here are placeholders
  # that should never reach the cluster but are kept non-empty so
  # `helm template` works for local validation.
  runnerScaleSetName: PLACEHOLDER
  maxRunners: 1

  # Skip the runtime discovery dance — we know the controller's SA from
  # arc-controller/values.yaml.
  controllerServiceAccount:
    name: arc-controller
    namespace: arc-controller

  # Org-level scope so any veric-dev repo can dispatch jobs here.
  githubConfigUrl: "https://github.com/veric-dev"

  # Pre-created secret (synced from foundation SM by the
  # ExternalSecret in templates/external-secret.yaml).
  githubConfigSecret: arc-github-config

  # Scale-to-zero. Pods spawn on-demand, terminate after one job.
  minRunners: 0

  # Containers run as the default GitHub runner image. Override per-job
  # via container actions if needed.
  containerMode:
    type: ""   # empty = "kubernetes" mode disabled, plain pod mode

  template:
    spec:
      serviceAccountName: arc-runner
      # 2026-05-11: terminationGracePeriodSeconds = 2700 (45 min) — pairs
      # with the NodePool-level `terminationGracePeriod: 45m` (chart
      # appVersion 1.11.1). On a Karpenter-initiated node drain the
      # preStop hook below blocks until the actions-runner subprocess
      # (`Runner.Worker`) exits, which means until the active job
      # finishes. 45m is the worst-case rust-ci wall clock; if a job is
      # genuinely longer than that we'd rather fail it than indefinitely
      # block a node. Replaces the previous `karpenter.sh/do-not-disrupt`
      # pin (which blocked all voluntary consolidation including idle
      # reclamation — the actual root cause of K-series).
      terminationGracePeriodSeconds: 2700
      containers:
        - name: runner
          # preStop drain hook — when Karpenter (or any other source)
          # sends SIGTERM to evict the pod, we block container shutdown
          # until the actions-runner worker process exits. Runner.Worker
          # is the per-job subprocess actions/runner forks; if it's
          # alive a job is running. Polls every 5s; the outer
          # terminationGracePeriodSeconds bounds total wait time.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    while pgrep -f Runner.Worker >/dev/null 2>&1; do
                      sleep 5
                    done
          # Foundation-baked runner image: upstream actions-runner +
          # build-essential / mold / pkg-config / libssl-dev /
          # ca-certificates / curl preinstalled. Saves the ~30-60s
          # `apt-get install` step that every Rust workflow used to
          # run per cold pod. Built by veric-aws's
          # build-runner-image.yml on push to runner-image/** + a
          # weekly cron. ECR cross-account pull policy lets
          # platform-{dev,nonprod,prod} EKS nodes fetch via the
          # standard AmazonEC2ContainerRegistryReadOnly node role.
          image: 487542879472.dkr.ecr.us-west-2.amazonaws.com/veric-foundation/arc-runner:latest
          command: ["/home/runner/run.sh"]
          # The actions-runner image bundles node20 at
          # /home/runner/externals/node20/bin but doesn't put it on
          # system PATH. Marketplace actions ship JS entrypoints with
          # `#!/usr/bin/env node` shebangs, so without this `tofu init`
          # (and any other action-wrapped step) fails with
          # "/usr/bin/env: 'node': No such file or directory".
          env:
            - name: PATH
              value: "/home/runner/externals/node20/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            # Codeload-proxy wiring (2026-05-12). The shared VPC NAT
            # gateway intermittently drops TCP handshakes under burst to
            # github.com, codeload.github.com, static.crates.io,
            # index.crates.io, static.rust-lang.org — fails actions/
            # checkout, rust-cache, cargo fetches with the 100s
            # HttpClient timeout × 3 retries pattern. The in-cluster
            # Squid CONNECT proxy fronts those hostnames; a single
            # long-lived CONNECT tunnel through Squid absorbs that
            # class of failure server-side. Lower-case `https_proxy`
            # because most CLIs (curl, cargo, gh, rustup) check the
            # lowercase form; upper-case is added for Java/.NET tools
            # like the runner agent itself.
            #
            # NO_PROXY is deliberately broad to keep cluster-internal
            # and AWS-internal traffic off the proxy:
            #   .svc, .cluster.local        → in-cluster service DNS
            #   localhost, 127.0.0.1, ::1   → loopback (sccache local)
            #   169.254.169.254              → EC2 IMDS (sccache OIDC,
            #                                  AWS SDK auth chain)
            #   .amazonaws.com               → S3 / ECR / SM / STS
            #   .veric.dev                   → kellnr registry
            #   *.local                       → mdns / link-local
            #   .actions.githubusercontent.com → ARC runner broker
            #     (pipelinesghubeus*.actions.githubusercontent.com).
            #     The runner agent maintains a long-lived control-plane
            #     session here for job poll + log stream + status. If
            #     proxied, Squid must allow the host by ACL or every
            #     runner pod 403s on registration and no jobs ever
            #     execute. Caught live 2026-05-12: the initial PR #16
            #     env-wiring rolled out without this exclusion, every
            #     pool's pods went into zombie mode (Running but
            #     unregistered), proxy access.log showed
            #     `TCP_DENIED:HIER_NONE` 403 on every CONNECT to
            #     pipelinesghubeus21.actions.githubusercontent.com.
            #     Direct path is the right call: the broker stream
            #     is long-lived persistent TCP, not the short download
            #     burst class Squid is meant to dampen, and proxying
            #     it makes Squid a SPOF for the entire ARC fleet.
            #
            # If codeload-proxy is unavailable, only github / crates
            # / rust-lang hosts fail — which is the same set that
            # already fails today through the cold NAT. So this is
            # a strict no-regression: success window strictly larger
            # than the no-proxy baseline.
            - name: HTTPS_PROXY
              value: "http://codeload-proxy.codeload-proxy.svc:3128"
            - name: https_proxy
              value: "http://codeload-proxy.codeload-proxy.svc:3128"
            - name: HTTP_PROXY
              value: "http://codeload-proxy.codeload-proxy.svc:3128"
            - name: http_proxy
              value: "http://codeload-proxy.codeload-proxy.svc:3128"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,::1,169.254.169.254,.svc,.svc.cluster.local,.cluster.local,.amazonaws.com,.veric.dev,.local,.eks.amazonaws.com,.actions.githubusercontent.com,buildkit.buildkit.svc"
            - name: no_proxy
              value: "localhost,127.0.0.1,::1,169.254.169.254,.svc,.svc.cluster.local,.cluster.local,.amazonaws.com,.veric.dev,.local,.eks.amazonaws.com,.actions.githubusercontent.com,buildkit.buildkit.svc"
          resources:
            # 4 GiB was too tight for release builds of veric-cli (duckdb-bundled
            # peaks at ~8 GiB during link). Symptom: runner pod silently OOM-killed
            # mid-`cargo build` and GitHub Actions reports
            # "self-hosted runner lost communication with the server" because
            # the runner agent dies with the container. 16 GiB headroom matches
            # the prior Azure VMSS sizing (D4as_v5 = 16 GiB) so historically
            # green workflows stay green. The `release` pool bumps further to
            # D8as_v5 (32 GiB / 8 vCPU) — see applicationset.yaml.
            requests:
              cpu: "2"
              memory: "8Gi"
              # Cargo target dirs + nextest archive + runner image easily hit
              # 6-10Gi during a build. Without a request, kubelet treats
              # ephemeral-storage as best-effort and evicts the runner mid-job
              # under disk pressure (observed 2026-05-02 across rust-ci on
              # engine/cli/ag — "low on resource: ephemeral-storage" with
              # the runner using 6.8Gi). Pair with the EC2NodeClass 100Gi
              # root volume so Karpenter sizes nodes that can hold one of
              # these per slot with headroom for kubelet/system overhead.
              ephemeral-storage: "20Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
              ephemeral-storage: "40Gi"
