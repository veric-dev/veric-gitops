apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arc-github-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-foundation-secretsmanager
    kind: ClusterSecretStore
  target:
    name: arc-github-config
    creationPolicy: Owner
  data:
    # PAT-only for bootstrap. When migrating to GitHub App auth, add
    # github_app_id / github_app_installation_id / github_app_private_key
    # entries to SM and to this list, and remove github_token. ARC's
    # secret format docs:
    # https://github.com/actions/actions-runner-controller/blob/master/docs/authenticating-to-the-github-api.md
    - secretKey: github_token
      remoteRef:
        key: veric/foundation/github-app/arc
        property: github_token
