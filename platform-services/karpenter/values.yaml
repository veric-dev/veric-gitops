karpenter:
  replicas: 1
  serviceAccount:
    create: true
    name: karpenter
    annotations:
      eks.amazonaws.com/role-arn: "" # set per env
  settings:
    clusterName: "" # set per env
    interruptionQueue: "" # set per env
    featureGates:
      spotToSpotConsolidation: true
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
  webhook:
    enabled: false

# NodePool/EC2NodeClass overrides per env. Defaults below match a "general
# workloads" pool. Override discovery cluster name + node role per env.
nodeClass:
  amiFamily: AL2023
  clusterName: "" # set per env
  nodeRoleName: "" # set per env
  # Set per env. Raw subnet/SG IDs (not tags) — see values-pdev.yaml.
  subnetIds: []
  securityGroupIds: []

nodePool:
  capacityTypes:
    - on-demand
    - spot
  # 2026-05-05 arm64 migration (Phase 2a). amd64 + arm64 in parallel
  # so Karpenter can provision arm64 capacity once it's needed; the
  # existing amd64-only MNGs still carry the workload until Phase 3
  # drains them. Phase 5 collapses this back to arm64-only.
  # Phase 5 patch: drop the `- amd64` line below once every cluster
  # has zero amd64 nodes (verify with `kubectl get nodes -L kubernetes.io/arch`
  # against pdev, np, prod). Karpenter then refuses to provision new
  # amd64 nodes regardless of pod arch hints.
  archs:
    - amd64
    - arm64
  instanceCategories:
    - m
    - c
    - r
  instanceGenerations:
    - "5"
    - "6"
    - "7"
  expireAfter: 720h
  # 2026-05-11: matches the longest pod-level terminationGracePeriodSeconds
  # we run (ARC runner = 2700s = 45m — see arc-runner-set values.yaml). If
  # we ever push that higher, raise this in lockstep; if this is shorter
  # than a pod's grace period the kubelet drain still gets cut off at the
  # node's deadline. Requires chart appVersion >= 1.2.
  terminationGracePeriod: 45m
  consolidationPolicy: WhenEmptyOrUnderutilized
  consolidateAfter: 30s
  # K6: per-reason disruption budgets (Karpenter v1.3+, lives in 1.11.1).
  # Each entry rate-limits a specific disruption *reason*. Order doesn't
  # matter — Karpenter applies the most restrictive matching budget per
  # reason. "nodes" is either an absolute count ("3") or a percent of
  # NodePool nodes ("10%"); percentages round down.
  #
  # Why these specific numbers:
  # - Underutilized = bin-packing consolidation. This is the path that
  #   yanks ARC runner nodes out from under mid-running jobs. Cap at
  #   10% so we never cycle more than 1 in 10 of the active fleet
  #   simultaneously; combined with the 45m terminationGracePeriod
  #   above and the runner preStop hook, a single job can finish even
  #   if its node is targeted for consolidation.
  # - Empty = nodes with zero pods. Cheap, safe, no in-flight work to
  #   protect. Allow 100% so post-build cleanup is fast.
  # - Drifted = NodePool/EC2NodeClass spec changed; nodes need recycling.
  #   Common during chart bumps. 20% cap means a 5-node fleet recycles
  #   over ~5 consolidation cycles instead of all at once.
  disruptionBudgets:
    - reasons: [Underutilized]
      nodes: "10%"
    - reasons: [Empty]
      nodes: "100%"
    - reasons: [Drifted]
      nodes: "20%"
  # 2026-05-11: bumped from 200/200Gi after ARC `release` pool runners
  # (4c/16Gi req — see arc-runner-set applicationset.yaml `bigPool: true`)
  # started failing to schedule on pdev. 7 baseline workload nodes
  # (app-stack + BuildKit + ArgoCD + smaller ARC pools) already saturated
  # the 200Gi cluster-wide cap, so Karpenter refused to provision more
  # nodes for the release pool's 10 ephemeral runners — they sat Pending
  # for 4-19h with `Failed to schedule pod, all available instance types
  # exceed limits for nodepool: "default"`. Cap raised to fit
  # baseline (~120Gi) + full release pool (10×16Gi = 160Gi) + headroom
  # for other big-pool surges, with CPU widened proportionally.
  cpuLimit: "400"
  memoryLimit: "500Gi"
