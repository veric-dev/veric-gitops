karpenter:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::155055143405:role/veric-karpenter-controller-veric-platform-nonprod"
  settings:
    clusterName: veric-platform-nonprod
    interruptionQueue: veric-karpenter-veric-platform-nonprod

nodeClass:
  clusterName: veric-platform-nonprod
  nodeRoleName: veric-karpenter-node-veric-platform-nonprod
  # Discovery via raw IDs, not tags — see values-pdev.yaml for the
  # rationale (tag-based discovery lost a fight with the upstream VPC + EKS
  # modules' `tags` attributes during a 2026-05-04 apply on pdev).
  subnetIds:
    - subnet-081c84cf8a8cba6a2
    - subnet-060c2418b5ee3076d
    - subnet-0eefd46025151c5ac
  securityGroupIds:
    - sg-0f071cc37372f43e5
    - sg-0a228c280bfa515b9

# Phase 6c (2026-05-05 arm64 migration): nonprod narrowed to arm64-only
# alongside zeroing the amd64 MNG sizes in platform-nonprod/main.tf.
nodePool:
  archs:
    - arm64
