apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: {{ .Values.nodeClass.amiFamily | quote }}
  role: {{ .Values.nodeClass.nodeRoleName | quote }}
  amiSelectorTerms:
    - alias: al2023@latest
  # Discovery via raw IDs (set per env in values-{pdev,np,prod}.yaml).
  # The prior tag-based discovery lost a fight with the upstream VPC + EKS
  # modules' `tags` attributes during a 2026-05-04 platform-dev tofu apply,
  # silently stripping `karpenter.sh/discovery` and breaking node
  # provisioning. IDs are immutable once subnets/SGs are created and
  # cannot be reverted by an out-of-band tag rewrite.
  subnetSelectorTerms:
{{- range .Values.nodeClass.subnetIds }}
    - id: {{ . | quote }}
{{- end }}
  securityGroupSelectorTerms:
{{- range .Values.nodeClass.securityGroupIds }}
    - id: {{ . | quote }}
{{- end }}
  tags:
    karpenter.sh/discovery: {{ .Values.nodeClass.clusterName | quote }}
    Project: veric-platform
    Environment: {{ .Values.nodeClass.clusterName | quote }}
    Owner: platform-eng
    ManagedBy: karpenter
  # AL2023 default root volume is 20Gi — too small for ARC runner pods that
  # cache restore Cargo target dirs (~6.8Gi observed) plus the runner image
  # (~640Mi). kubelet evicts the runner mid-job under disk pressure
  # ("low on resource: ephemeral-storage", observed 2026-05-02 across
  # rust-ci on engine/cli/ag). 100Gi gives headroom for parallel shards
  # and the 1Gi nextest archive without eviction churn.
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
