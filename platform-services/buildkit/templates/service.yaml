apiVersion: v1
kind: Service
metadata:
  name: buildkit{{ .Values.nameSuffix }}
  labels:
    app.kubernetes.io/name: buildkit{{ .Values.nameSuffix }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: tcp
      protocol: TCP
      name: tcp
  selector:
    app.kubernetes.io/name: buildkit{{ .Values.nameSuffix }}
