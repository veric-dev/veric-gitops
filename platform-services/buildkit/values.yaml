replicaCount: 1

# Suffix appended to all resource names + the in-cluster Service. Default
# is empty (single `buildkit` release, service `buildkit.buildkit.svc:
# 1234`). The 2026-05-05 arm64 migration briefly ran two sibling releases
# (`buildkit` amd64 + `buildkit-arm64`) for native multi-arch builds, then
# collapsed back to one release post-Phase-4. Kept parameterized so the
# pattern can be re-enabled for future cross-arch federation without a
# chart edit.
nameSuffix: ""

# Pin the release to a specific node arch via standard nodeSelector.
# Post-Phase-4 (2026-05-05 arm64 migration) the active release sets
# kubernetes.io/arch=arm64. Empty (default) lets the scheduler place
# anywhere — every active release should set this explicitly.
nodeSelector: {}

image:
  repository: moby/buildkit
  tag: v0.16.0-rootless
  pullPolicy: IfNotPresent

# Rootless BuildKit runs as uid 1000 in the user namespace; needs
# `unconfined` seccomp + AppArmor to call user-namespace syscalls
# without CAP_SYS_ADMIN. This is the buildkit upstream-recommended
# rootless pose for k8s — no privileged sidecar, no host docker socket.
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
securityContext:
  seccompProfile:
    type: Unconfined
  # AppArmor is set via the pod annotation `container.apparmor.security.
  # beta.kubernetes.io/buildkit: unconfined` in templates/deployment.yaml
  # — the structured `securityContext.appArmorProfile` field requires a
  # newer apiserver schema and broke Argo's structured-merge diff cache.

service:
  port: 1234

# Sized to keep buildkit off the legacy t4g.medium MNG (2 cpu / 4 GiB).
# A 2c request forces Karpenter to provision a real m/c/r 5/6/7 instance
# instead of the pod cohabiting with system pods on a 2-cpu node and
# starving any concurrent build (observed 2026-05-05: dbt arm64 leg
# crawled for 26 min on t4g.medium-hosted buildkit, then completed in
# 42s after the pod was rescheduled to an m7g.2xlarge).
resources:
  requests:
    cpu: 2
    memory: 4Gi
  limits:
    cpu: 6
    memory: 12Gi

# emptyDir cache for first cut — survives pod restarts only as long as
# the node doesn't recycle. Move to a PVC once we know the working set
# size and have a real cost story for EBS gp3.
cache:
  emptyDir:
    medium: ""
    sizeLimit: 32Gi
