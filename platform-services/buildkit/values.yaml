replicaCount: 1

# Suffix appended to all resource names + the in-cluster Service. Empty
# (the default) gives the original `buildkit` release. The arm64 sibling
# release passes `nameSuffix: "-arm64"` so it lands as `buildkit-arm64`
# in the same namespace without clashing — see platform-arc/applicationset
# .yaml. Federated-builders pattern (2026-05-05 arm64 migration option A).
nameSuffix: ""

# Pin a release to a specific node arch via standard nodeSelector. The
# amd64 release sets kubernetes.io/arch=amd64; the arm64 sibling release
# sets kubernetes.io/arch=arm64. Empty (default) lets the scheduler place
# anywhere — every active release should set this explicitly post-Phase-2b.
nodeSelector: {}

image:
  repository: moby/buildkit
  tag: v0.16.0-rootless
  pullPolicy: IfNotPresent

# Rootless BuildKit runs as uid 1000 in the user namespace; needs
# `unconfined` seccomp + AppArmor to call user-namespace syscalls
# without CAP_SYS_ADMIN. This is the buildkit upstream-recommended
# rootless pose for k8s — no privileged sidecar, no host docker socket.
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
securityContext:
  seccompProfile:
    type: Unconfined
  # AppArmor is set via the pod annotation `container.apparmor.security.
  # beta.kubernetes.io/buildkit: unconfined` in templates/deployment.yaml
  # — the structured `securityContext.appArmorProfile` field requires a
  # newer apiserver schema and broke Argo's structured-merge diff cache.

service:
  port: 1234

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 4
    memory: 8Gi

# emptyDir cache for first cut — survives pod restarts only as long as
# the node doesn't recycle. Move to a PVC once we know the working set
# size and have a real cost story for EBS gp3.
cache:
  emptyDir:
    medium: ""
    sizeLimit: 32Gi
