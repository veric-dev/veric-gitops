apiVersion: v1
kind: ConfigMap
metadata:
  name: codeload-proxy-config
data:
  squid.conf: |
    # Plain CONNECT proxy — no SSL bumping. The proxy sees TLS hostnames
    # via the CONNECT verb but never the TLS payload, so no custom CA
    # distribution is needed on clients.
    http_port 3128

    # Restrict CONNECT to the cold-NAT-prone hostnames the cluster
    # actually needs. Wider open-proxy would risk arbitrary egress.
    # `.github.com` covers codeload.github.com and api.github.com — Squid
    # warns if both parent and subdomain are listed in the same ACL.
    # `.github.io` covers GitHub Pages-hosted installer scripts:
    # - rustwasm.github.io/wasm-pack/installer/init.sh (wasm-pack curl|sh)
    # - aws.github.io (action config blobs)
    # Plus arbitrary org-page projects under github.io. These are static
    # asset CDNs, same risk profile as github.com. Caught 2026-05-12 in
    # ai-fundamentals#126 notebooks job (wasm-pack install 403).
    acl github_codeload dstdomain .github.com .github.io objects.githubusercontent.com release-assets.githubusercontent.com github-cloud.s3.amazonaws.com github-production-release-asset-2e65be.s3.amazonaws.com github-production-user-asset-6210df.s3.amazonaws.com
    acl crates_io      dstdomain static.crates.io index.crates.io crates.io
    # `static.rust-lang.org` carries the toolchain tarballs once rustup
    # is bootstrapped; `sh.rustup.rs` is the rustup installer shim
    # itself (`curl https://sh.rustup.rs | sh`). Workflows that run
    # actions-rust-lang/setup-rust-toolchain or any
    # `curl … | sh` install path hit the shim first — without it in the
    # ACL Squid 403s and the install step exits with `curl: (22) ...
    # error: 403`. Caught 2026-05-12 on ai-fundamentals#126 after PR #19
    # fixed log uploads (the failure was previously masked by missing
    # logs).
    acl rust_lang      dstdomain static.rust-lang.org forge.rust-lang.org sh.rustup.rs
    acl ghcr           dstdomain ghcr.io pkg-containers.githubusercontent.com
    acl pypi           dstdomain pypi.org files.pythonhosted.org
    acl npm            dstdomain registry.npmjs.org
    # opentofu/setup-opentofu downloads the tofu binary from
    # `get.opentofu.org` (CDN-fronted) and pulls the GPG key from
    # `get.opentofu.org/opentofu.gpg`. Without this ACL entry, every
    # platform-aws workflow that runs `setup-opentofu` 403s during the
    # download step. Same triage path as sh.rustup.rs (2026-05-12).
    acl opentofu       dstdomain get.opentofu.org releases.opentofu.org registry.opentofu.org
    # AWS API endpoints. Despite NO_PROXY=`.amazonaws.com` being set on
    # the runner pod, `aws-actions/configure-aws-credentials@v4` injects
    # an https-proxy-agent into the STS client unconditionally — it does
    # NOT honor NO_PROXY for that specific client. Result: STS calls go
    # through Squid; without this ACL Squid 403s the CONNECT, the OIDC
    # AssumeRoleWithWebIdentity silently swallows the error, no creds
    # are exported to env, and every downstream AWS Action step
    # (`amazon-ecr-login`, `aws-secretsmanager-get-secrets`, …) fails
    # with "Could not load credentials from any providers".
    #
    # Caught 2026-05-12 across:
    #   - veric-engine#129 fast (cargo-registry-auth → SecretsManager)
    #   - veric-aws build-runner-image (ECR login)
    # The .amazonaws.com wildcard covers sts, ecr (push/pull), secrets
    # manager, S3, etc — same set that NO_PROXY already targets.
    acl aws_api        dstdomain .amazonaws.com
    # Playwright browser bundle CDNs. Microsoft fronts the Chromium /
    # Firefox / WebKit downloads through three rotating mirrors; the
    # client tries them in order. Without all three in the ACL,
    # `playwright install` 403s the first two and the third is
    # rate-limited / fails CDN edge.
    # Caught 2026-05-12 on veric-saas#26 e2e seed job.
    acl playwright     dstdomain cdn.playwright.dev playwright.download.prss.microsoft.com
    # Cloudflare Worker / DNS APIs called by veric-aws tofu plans
    # (cloudflare provider). Same NO_PROXY-bypass class as AWS SDK.
    acl cloudflare_api dstdomain api.cloudflare.com

    acl SSL_ports port 443
    acl CONNECT method CONNECT

    http_access allow CONNECT SSL_ports github_codeload
    http_access allow CONNECT SSL_ports crates_io
    http_access allow CONNECT SSL_ports rust_lang
    http_access allow CONNECT SSL_ports ghcr
    http_access allow CONNECT SSL_ports pypi
    http_access allow CONNECT SSL_ports npm
    http_access allow CONNECT SSL_ports opentofu
    http_access allow CONNECT SSL_ports aws_api
    http_access allow CONNECT SSL_ports playwright
    http_access allow CONNECT SSL_ports cloudflare_api
    http_access deny  CONNECT !SSL_ports
    http_access deny  all

    # Cache TLS-tunnel metadata (DNS, peer state). We can't cache the
    # encrypted payload but Squid will reuse upstream TCP sessions
    # which is the actual win here.
    cache deny all

    # Connection retry: aggressive on outbound establishment so a
    # cold-NAT SYN drop gets a fresh attempt within 5 s rather than
    # the client retrying 100 s later.
    connect_timeout 8 seconds
    forward_max_tries 5
    request_timeout 60 seconds

    # Log to an emptyDir volume mounted at /var/log/squid. Earlier
    # attempts wrote to /dev/stdout and /proc/1/fd/{1,2} so `kubectl logs`
    # would see them, but both fail: Squid's worker drops privileges to
    # user `proxy` after fork, and neither path is writable by `proxy`
    # (FATAL: Cannot open '/proc/1/fd/1' for writing. The parent
    # directory must be writeable by the user 'proxy'). emptyDir is
    # writable; logs are accessible via `kubectl exec` when needed.
    access_log /var/log/squid/access.log combined
    cache_log  /var/log/squid/cache.log

    visible_hostname codeload-proxy
    # `dns_v4_first` was removed in Squid 6 — emits "ERROR: Directive
    # is obsolete" at startup. We don't care about preferential A/AAAA
    # ordering for these tunnels.
    pid_filename none
