apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeload-proxy
  labels:
    app.kubernetes.io/name: codeload-proxy
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: codeload-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codeload-proxy
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: codeload-proxy
      containers:
        - name: squid
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3128
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
              readOnly: true
            # Squid drops privileges to user `proxy` after fork, then can't
            # write to /proc/1/fd/{1,2} (PID 1's stdout/stderr) because the
            # fd parent dir is owned by root. Writing to a writable
            # emptyDir is the simplest fix; logs are accessible via
            # `kubectl exec ... tail /var/log/squid/access.log` when
            # needed for diagnosis. We pay no kubectl-logs visibility for
            # the steady state — the proxy's correctness is observable
            # via the runner workflows that depend on it.
            - name: logs
              mountPath: /var/log/squid
          readinessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: codeload-proxy-config
        - name: logs
          emptyDir:
            sizeLimit: 1Gi
