apiVersion: v1
kind: Service
metadata:
  name: codeload-proxy
  labels:
    app.kubernetes.io/name: codeload-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: codeload-proxy
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 3128
      protocol: TCP
