# ARC ApplicationSet — scoped to platform-dev cluster only.
#
# A single ARC pool serves the whole org. Running ARC on more than one
# cluster spawns redundant listeners polling the same scale set, which
# is wasteful at best and confusing at worst (jobs land on whichever
# pool grabs them first). The platform-dev tofu env creates the
# bootstrap Application that points at this directory; nonprod/prod
# tofu envs do not.
#
# We deploy ONE arc-controller plus FIVE ephemeral runner scale-sets
# named after the legacy Azure VMSS pool labels (`fast`, `release`,
# `build`, `spot`, `self-hosted-linux-x64`) — each scale-set is a
# separate Helm release of the SAME `arc-runner-set` chart, sharded
# by namespace + helm.parameters override. Naming the scale-sets
# after the existing labels means sibling-repo workflows
# (`runs-on: [self-hosted, linux, x64, fast]` etc.) match without any
# rewrites — ephemeral runners self-register `[self-hosted, Linux,
# X64, <scale-set-name>]` and GH self-hosted label match is
# case-insensitive.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-arc
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          # Controller installs CRDs the runner-set CR depends on — sync
          # waves enforce order.
          - service: arc-controller
            chart: arc-controller
            namespace: arc-controller
            syncWave: "0"
            poolName: ""
            maxRunners: ""
            bigPool: "false"
            nameSuffix: ""
            nodeArch: ""
          # Five ephemeral runner-sets, one per legacy pool label.
          # All use the same arc-runner-set chart with helm parameter
          # overrides for `runnerScaleSetName` and `maxRunners`.
          # Resource sizing per-pool: most pools inherit the chart
          # default (2c/4c/8Gi/16Gi, the D4as_v5-equiv post-2026-05-02
          # bump in values.yaml). The `release` pool sets `bigPool:
          # "true"` so the helm `values:` template below inline-
          # rewrites `gha-runner-scale-set.template.spec.containers`
          # with 4c/8c/16Gi/32Gi (D8as_v5-equiv) — veric-cli's
          # release-ship build links duckdb-bundled (~8 GiB peak) and
          # parallelises 24+ codegen units, so link memory + codegen
          # wall-clock are the binding constraints. Helm REPLACES
          # arrays on merge (scalars/maps merge), so overriding just
          # `resources` requires rewriting the whole `containers:`
          # list. Other pools stay small to keep idle/spot economics
          # tight.
          - service: arc-runner-set-fast
            chart: arc-runner-set
            namespace: arc-runner-set-fast
            syncWave: "1"
            poolName: fast
            # 2026-05-12: re-bump 10 → 25 alongside `bigPool: "small"`
            # (1c/4Gi requests, limits unchanged at 4c/16Gi). K9 (#7)
            # reverted the original quota-driven bin-pack hack on
            # 2026-05-11 after the On-Demand Standard quota
            # (L-1216C47A) closed at 200 vCPU, since the bin-packing
            # was no longer needed for safety. This re-bump is for a
            # different reason: observed sustained saturation under
            # multi-repo PR load (4 PRs × 5-10 jobs each fan in on
            # `fast`); jobs queue 30+ min waiting for runners. At 1c
            # request per pod, 25 pods is 25 vCPU, comfortably inside
            # the 200 vCPU headroom even with the release pool at 10
            # (×4c req = 40 vCPU) and build at 10 (×2c req = 20 vCPU).
            # Total commit: 25+40+20 = 85 vCPU vs 200 quota.
            maxRunners: "25"
            bigPool: "small"
            nameSuffix: ""
            nodeArch: ""
          - service: arc-runner-set-release
            chart: arc-runner-set
            namespace: arc-runner-set-release
            syncWave: "1"
            poolName: release
            maxRunners: "10"
            bigPool: "true"
            nameSuffix: ""
            nodeArch: ""
          - service: arc-runner-set-build
            chart: arc-runner-set
            namespace: arc-runner-set-build
            syncWave: "1"
            poolName: build
            maxRunners: "10"
            bigPool: "false"
            nameSuffix: ""
            nodeArch: ""
          - service: arc-runner-set-spot
            chart: arc-runner-set
            namespace: arc-runner-set-spot
            syncWave: "1"
            poolName: spot
            # 2026-05-12: 10 → 20. ai-fund's notebooks +
            # notebook-widgets + playground all run on `spot` and
            # together saturate the pool every PR, queueing 30+ min
            # behind sibling-repo jobs. The pool name is legacy —
            # `spot` schedules onto the same Karpenter NodePool
            # (capacityTypes=[on-demand,spot]) as `fast`, so this
            # is a logical scale-set bump, not actual spot capacity.
            # No quota concerns (1c/4Gi requests × 20 = 20 vCPU,
            # comfortably inside the 200 vCPU on-demand quota).
            maxRunners: "20"
            bigPool: "small"
            nameSuffix: ""
            nodeArch: ""
          - service: arc-runner-set-self-hosted-linux-x64
            chart: arc-runner-set
            namespace: arc-runner-set-self-hosted-linux-x64
            syncWave: "1"
            poolName: self-hosted-linux-x64
            maxRunners: "10"
            bigPool: "false"
            nameSuffix: ""
            nodeArch: ""
          # BuildKit lives on the same cluster as the ARC runners so the
          # runner pods can resolve buildkit.buildkit.svc:1234 over cluster
          # DNS. The chart's values.yaml ignores poolName/maxRunners; they're
          # passed because the template's `helm.values` block always emits
          # them. See platform-services/buildkit/Chart.yaml for rationale on
          # the rootless pose + emptyDir cache.
          # Phase 4 of the 2026-05-05 arm64 migration: collapsed back to a
          # single `buildkit` release pinned to arm64 nodes (the federated
          # amd64 sibling has been deleted now that all CI workflows build
          # linux/arm64 only). Service name `buildkit.buildkit.svc:1234`
          # is unchanged from the pre-federation original — callers keep
          # the same endpoint across the whole migration.
          - service: buildkit
            chart: buildkit
            namespace: buildkit
            syncWave: "1"
            poolName: ""
            maxRunners: ""
            bigPool: "false"
            nameSuffix: ""
            nodeArch: arm64
  template:
    metadata:
      name: '{{.service}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{.syncWave}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/veric-dev/veric-gitops
        targetRevision: main
        path: 'platform-services/{{.chart}}'
        helm:
          # `values` (raw YAML string) rather than `parameters`/`valuesObject`
          # so maxRunners reaches helm as a YAML int. The upstream
          # gha-runner-scale-set template does
          # `gt .Values.minRunners .Values.maxRunners`; `--set foo=10` and
          # JSON-typed valuesObject both deliver "10" as a string and break
          # the comparison. Inside `|`, Argo's goTemplate substitutes the
          # placeholders into raw text that helm then parses as YAML.
          # Extra keys are ignored by arc-controller (which doesn't consume
          # them) so the same template works for the controller entry.
          # `bigPool` is a tri-state used to override the runner
          # container's `resources` block per pool. The chart's
          # values.yaml ships the default (2c/4c req/lim cpu,
          # 8Gi/16Gi req/lim memory) suited to clippy+nextest archive
          # builds on `fast` and the `build` pool. Overriding requires
          # rewriting the whole `containers:` array because helm
          # REPLACES arrays on merge (scalars/maps merge).
          #   - "false": inherit values.yaml defaults
          #   - "true":  inject 4c/8c/16Gi/32Gi (D8as_v5-equiv) for
          #              `release` — veric-cli release-ship linking
          #              duckdb-bundled needs the ~8 GiB peak.
          #   - "small": inject 1c/4c/4Gi/16Gi — request half, limit
          #              unchanged so workloads can still burst when
          #              a node has headroom. Used for `fast` while
          #              EC2 quota cases sit at CASE_OPENED so more
          #              runner pods bin-pack onto existing nodes
          #              without needing Karpenter to provision new
          #              instances.
          # Replicates the values.yaml container spec verbatim except
          # for the resource bump — keep these in sync if values.yaml
          # changes the runner image, command, env, PATH, or
          # lifecycle/preStop hook (K-series drain fix 2026-05-11).
          values: |
            poolNamespace: {{.namespace}}
            {{- if eq .chart "buildkit" }}
            # buildkit chart: nameSuffix + nodeSelector for the
            # federated-builders pattern (2026-05-05 arm64 migration). The
            # arc-* charts ignore these keys, but goTemplate's missingkey
            # =error means every generator entry must declare them — see
            # the empty `nameSuffix:`/`nodeArch:` lines on each entry.
            nameSuffix: "{{.nameSuffix}}"
            nodeSelector:
              kubernetes.io/arch: {{.nodeArch}}
            {{- end }}
            gha-runner-scale-set:
              runnerScaleSetName: {{.poolName}}
              maxRunners: {{.maxRunners}}
              {{- if eq .bigPool "true" }}
              template:
                spec:
                  serviceAccountName: arc-runner
                  terminationGracePeriodSeconds: 2700
                  containers:
                    - name: runner
                      image: 487542879472.dkr.ecr.us-west-2.amazonaws.com/veric-foundation/arc-runner:latest
                      command: ["/home/runner/run.sh"]
                      env:
                        - name: PATH
                          value: "/home/runner/externals/node20/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                      lifecycle:
                        preStop:
                          exec:
                            command:
                              - /bin/sh
                              - -c
                              - |
                                while pgrep -f Runner.Worker >/dev/null 2>&1; do
                                  sleep 5
                                done
                      resources:
                        requests:
                          cpu: "4"
                          memory: "16Gi"
                        limits:
                          cpu: "8"
                          memory: "32Gi"
              {{- else if eq .bigPool "small" }}
              template:
                spec:
                  serviceAccountName: arc-runner
                  terminationGracePeriodSeconds: 2700
                  containers:
                    - name: runner
                      image: 487542879472.dkr.ecr.us-west-2.amazonaws.com/veric-foundation/arc-runner:latest
                      command: ["/home/runner/run.sh"]
                      env:
                        - name: PATH
                          value: "/home/runner/externals/node20/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                      lifecycle:
                        preStop:
                          exec:
                            command:
                              - /bin/sh
                              - -c
                              - |
                                while pgrep -f Runner.Worker >/dev/null 2>&1; do
                                  sleep 5
                                done
                      resources:
                        requests:
                          cpu: "1"
                          memory: "4Gi"
                          ephemeral-storage: "20Gi"
                        limits:
                          cpu: "4"
                          memory: "16Gi"
                          ephemeral-storage: "40Gi"
              {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jsonPointers:
            - /spec/data
            - /spec/target/creationPolicy
            - /spec/target/deletionPolicy
